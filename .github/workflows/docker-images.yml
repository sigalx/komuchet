name: Docker Images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PHP_IMAGE: ghcr.io/${{ github.repository }}/php
  NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx
  IMAGE_TAG: sha-${{ github.sha }}
  PHP_VERSION: "8.5"
  NGINX_VERSION: stable-alpine

jobs:
  build-and-push:
    name: Build and push production images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          target: prod
          push: true
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
          tags: |
            ${{ env.PHP_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.PHP_IMAGE }}:latest
          cache-from: type=gha,scope=php-prod
          cache-to: type=gha,scope=php-prod,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          target: prod
          push: true
          build-args: |
            APP_IMAGE=${{ env.PHP_IMAGE }}:${{ env.IMAGE_TAG }}
            NGINX_VERSION=${{ env.NGINX_VERSION }}
          tags: |
            ${{ env.NGINX_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.NGINX_IMAGE }}:latest
          cache-from: type=gha,scope=nginx-prod
          cache-to: type=gha,scope=nginx-prod,mode=max
