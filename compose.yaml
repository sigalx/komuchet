x-logging: &logopts
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  php-web:
    <<: *logopts
    environment:
      TZ: ${TZ:-UTC}
      DATABASE_URL: "${DATABASE_URL:-postgresql://snt:snt@database:5432/snt?serverVersion=18&charset=utf8}"
    healthcheck:
      test: ["CMD-SHELL", "php -v || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    init: true
    stop_signal: SIGQUIT
    stop_grace_period: 10s

  php-cli:
    <<: *logopts
    environment:
      TZ: ${TZ:-UTC}
      DATABASE_URL: "${DATABASE_URL:-postgresql://snt:snt@database:5432/snt?serverVersion=18&charset=utf8}"
    healthcheck:
      test: ["CMD-SHELL", "php -v || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    init: true
    stop_grace_period: 10s

  nginx:
    <<: *logopts
    depends_on:
      php-web:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    init: true
    stop_signal: SIGQUIT
    stop_grace_period: 10s
