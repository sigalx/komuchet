doctrine:
    dbal:
        types:
            datetimetz_immutable: App\Doctrine\Type\PostgreSQLDateTimeTzImmutableType
            text_array: App\Doctrine\Type\PostgreSQLTextArrayType
        url: '%env(resolve:DATABASE_URL)%'
        mapping_types:
            _text: text_array
            inet: string
            workspace_user_role_code: string
            subscriber_account_access_role: string
            electricity_meter_reading_source: string
            electricity_consumption_band_allocation_method: string
            electricity_consumption_band_rule_scope_mode: string
            billing_run_kind: string
            billing_run_account_issue_type: string
            billing_run_account_issue_close_reason: string
            accrual_type: string
            payment_source: string
            audit_log_source: string
            account_statement_delivery_channel: string
            zavety_michurina_statement_import_file_status: string

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        dql:
            string_functions:
                SEARCH_COLLATE: App\Doctrine\Dql\SearchCollateFunction
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
