x-php-dev-base: &php-dev-base
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    target: dev
    args:
      PHP_VERSION: ${PHP_VERSION:-8.5}
  environment:
    TZ: ${TZ:-UTC}
    APP_ENV: dev
    APP_DEBUG: "1"
    DATABASE_URL: "postgresql://${POSTGRES_USER:-snt}:${POSTGRES_PASSWORD:-snt}@database:5432/${POSTGRES_DB:-snt}?serverVersion=${POSTGRES_VERSION:-18}&charset=utf8"
    PHP_IDE_CONFIG: "serverName=snt"
    XDEBUG_MODE: ${XDEBUG_MODE:-off}
    XDEBUG_CONFIG: "client_host=${XDEBUG_CLIENT_HOST:-host.docker.internal} client_port=${XDEBUG_CLIENT_PORT:-9003}"
    COMPOSER_CACHE_DIR: /tmp/composer-cache
    COMPOSER_HOME: /tmp/composer-home
    COMPOSER_ALLOW_SUPERUSER: "1"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  read_only: true
  tmpfs:
    - /tmp
    - /run

services:
  php-web:
    <<: *php-dev-base
    volumes:
      - ./:/var/www/html:ro
      - php_var:/var/www/html/var
      - php_socket:/run/php

  php-cli:
    <<: *php-dev-base
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "php -v || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - ./:/var/www/html
      - php_var:/var/www/html/var
      - composer_cache:/tmp/composer-cache
      - composer_home:/tmp/composer-home

  composer:
    <<: *php-dev-base
    profiles:
      - tools
    entrypoint: ["composer"]
    command: ["--version"]
    volumes:
      - ./:/var/www/html
      - php_var:/var/www/html/var
      - composer_cache:/tmp/composer-cache
      - composer_home:/tmp/composer-home

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    profiles:
      - tools
    working_dir: /work
    environment:
      CI: ${CI:-}
      E2E_BASE_URL: ${E2E_BASE_URL:-http://nginx}
      E2E_EMAIL: ${E2E_EMAIL:-smoke.playwright@example.test}
      E2E_PASSWORD: ${E2E_PASSWORD:-smoke-password-123}
      E2E_WORKSPACE_NAME: ${E2E_WORKSPACE_NAME:-Демо smoke КомУчёт}
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/npm-cache
      PLAYWRIGHT_OUTPUT_DIR: /tmp/playwright-test-results
      PLAYWRIGHT_HTML_REPORT: /tmp/playwright-report
    depends_on:
      nginx:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./:/work:ro
      - e2e_node_modules:/work/node_modules
      - e2e_npm_cache:/tmp/npm-cache
    entrypoint: ["sh", "-lc"]
    command: ["npm ci --no-audit --no-fund && npm run test:e2e:smoke --"]

  nginx:
    image: nginx:stable-alpine
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    volumes:
      - ./:/var/www/html:ro
      - php_socket:/run/php
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  database:
    image: postgres:${POSTGRES_VERSION:-18}
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${POSTGRES_DB:-snt}
      POSTGRES_USER: ${POSTGRES_USER:-snt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snt}
    ports:
      - "127.0.0.1:${PG_LOCAL_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-snt} -U ${POSTGRES_USER:-snt}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql

volumes:
  php_var:
  php_socket:
  composer_cache:
  composer_home:
  e2e_node_modules:
  e2e_npm_cache:
  database_data:
